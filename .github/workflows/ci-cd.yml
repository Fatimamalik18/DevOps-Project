name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t fatiamamalik/devops-project:latest .

      - name: Run Container (Test)
        run: docker run -d -p 8080:80 fatiamamalik/devops-project:latest

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker Image
        run: docker push fatiamamalik/devops-project:latest

      - name: Deploy to Cloud
        run: echo "Application deployed successfully"
