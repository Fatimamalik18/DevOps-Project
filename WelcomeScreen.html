<!DOCTYPE html>
<html>
<head>
    <title>Welcome Screen</title>
    <style>
        body {
            font-family: Georgia, serif;
            background-color: #586f92;
            text-align: center;
            margin: 0;
        }

        /* Navigation Bar */
        nav {
            background-color: #2c3e50;
            padding: 15px 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 18px;
            font-weight: bold;
        }

        nav a:hover {
            color: #e75cd0;
        }

        .content {
            padding-top: 150px;
        }

        h1 {
            color: #2c3e50;
        }

        p {
            color: #555;
        }

        button {
            font-family: Georgia, serif;
            color: white;
            background-color: #e75cd0;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #d14bb9;
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
    </nav>

    <div class="content">
        <h1>Welcome!</h1>
        <p>We are glad to have you here.</p>
        <button>Get Started</button>
    </div>

</body>
</html>
